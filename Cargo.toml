[package]
name = "aria"
version = "0.2.0"
edition = "2021"

[dependencies]
chacha20poly1305 = "0.10"
base64 = "0.21"
hex = "0.4"
tch = "0.15"
tokenizers = "0.15"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
rand = "0.8"
uuid = { version = "1.0", features = ["v4", "serde"] }

[[bin]]
name = "aria"
path = "src/main.rs"