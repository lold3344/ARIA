[package]
name = "aria"
version = "0.2.0"
edition = "2021"

[dependencies]
ndarray = "0.15"
ndarray-rand = "0.14"
rand = "0.8"
rand_distr = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chacha20poly1305 = "0.10"
base64 = "0.21"
anyhow = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
hex = "0.4"
half = "2.4"
rayon = "1.7"

[[bin]]
name = "aria"
path = "src/main.rs"
